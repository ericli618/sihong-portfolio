<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <!-- Paper airplane pointer — same design, slightly larger for hover state -->
  <g transform="translate(2,1)">
    <!-- Main outer shape -->
    <path d="M1 1 L31 12.5 L18 32 L16 24 L7 28.5 L11.5 18 Z"
          stroke="#111111"
          stroke-width="2.4"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="#ffffff"/>

    <!-- Center fold line from nose -->
    <path d="M1 1 L16 24"
          stroke="#111111"
          stroke-width="2.2"
          stroke-linecap="round"/>

    <!-- Inner fold from center to right tip -->
    <path d="M16 24 L31 12.5"
          stroke="#111111"
          stroke-width="1.8"
          stroke-linecap="round"/>

    <!-- Bottom wing fold -->
    <path d="M16 24 L18 32"
          stroke="#111111"
          stroke-width="2"
          stroke-linecap="round"/>

    <!-- Diagonal hatching on lower-right wing panel -->
    <clipPath id="lowerWingP">
      <path d="M16 24 L31 12.5 L18 32 Z"/>
    </clipPath>
    <g clip-path="url(#lowerWingP)">
      <line x1="18" y1="16" x2="15" y2="29" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="20" y1="15" x2="16.5" y2="30" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="22" y1="14" x2="18" y2="31" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="24" y1="13.5" x2="19.5" y2="31" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="26" y1="13" x2="21" y2="31" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="28" y1="12.5" x2="22.5" y2="31" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="30" y1="12" x2="24" y2="31" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- Diagonal hatching on lower-left wing panel -->
    <clipPath id="lowerLeftWingP">
      <path d="M11.5 18 L16 24 L7 28.5 Z"/>
    </clipPath>
    <g clip-path="url(#lowerLeftWingP)">
      <line x1="8" y1="22" x2="12.5" y2="29" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="9.5" y1="21" x2="14" y2="28" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="11" y1="20" x2="15.5" y2="27" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="12.5" y1="19" x2="16" y2="25.5" stroke="#111111" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
