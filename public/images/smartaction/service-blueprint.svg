<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="sb-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="sb-arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Panel background -->
  <rect width="960" height="480" fill="#f3f4f6" rx="8"/>

  <!-- Phase labels -->
  <g font-size="10" fill="#6b7280" letter-spacing="1.8" text-anchor="middle" font-weight="500">
    <text x="185" y="40">POSTMARK</text>
    <text x="310" y="40">SCAN</text>
    <text x="440" y="40">INTAKE</text>
    <text x="580" y="40">ANALYSIS</text>
    <text x="720" y="40">QA / REDACT</text>
    <text x="860" y="40">ARCHIVE</text>
  </g>

  <!-- Phase column dividers -->
  <g stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3 4">
    <line x1="250" y1="58" x2="250" y2="450"/>
    <line x1="375" y1="58" x2="375" y2="450"/>
    <line x1="510" y1="58" x2="510" y2="450"/>
    <line x1="650" y1="58" x2="650" y2="450"/>
    <line x1="795" y1="58" x2="795" y2="450"/>
  </g>

  <!-- Swim lane dividers (horizontal) -->
  <g stroke="#d1d5db" stroke-width="1">
    <line x1="120" y1="58" x2="940" y2="58"/>
    <line x1="120" y1="155" x2="940" y2="155"/>
    <line x1="120" y1="255" x2="940" y2="255"/>
    <line x1="120" y1="360" x2="940" y2="360"/>
    <line x1="120" y1="450" x2="940" y2="450"/>
  </g>

  <!-- Swim lane labels -->
  <g font-size="10" fill="#6b7280" letter-spacing="1.2" font-weight="500">
    <text x="22" y="110">VETERAN</text>
    <text x="22" y="210">FRONTSTAGE</text>
    <text x="22" y="310">BACKSTAGE</text>
    <text x="22" y="408">VENDOR</text>
  </g>

  <!-- Cards -->
  <!-- Veteran / Postmark -->
  <rect x="130" y="80" width="110" height="60" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="185" y="102" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">Veteran submits</text>
  <text x="185" y="118" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">Form 10-10D</text>
  <text x="185" y="132" text-anchor="middle" font-size="9" fill="#6b7280">~6.6M/yr</text>

  <!-- Frontstage / Scan -->
  <rect x="262" y="178" width="100" height="56" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="312" y="198" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">IM scans &amp;</text>
  <text x="312" y="213" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">uploads PDF</text>
  <text x="312" y="226" text-anchor="middle" font-size="9" fill="#6b7280">Iron Mountain</text>

  <!-- Frontstage / Intake -->
  <rect x="386" y="178" width="112" height="56" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="442" y="198" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">Clerk reads &amp;</text>
  <text x="442" y="213" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">routes manually</text>
  <text x="442" y="226" text-anchor="middle" font-size="9" fill="#b91c1c" font-weight="500">8–10 hand-offs</text>

  <!-- Frontstage / QA -->
  <rect x="662" y="178" width="128" height="56" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="726" y="198" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">Analyst approves</text>
  <text x="726" y="213" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">/ flags exceptions</text>
  <text x="726" y="226" text-anchor="middle" font-size="9" fill="#6b7280">if confidence &lt; 0.8</text>

  <!-- Backstage / Analysis 1: OCR -->
  <rect x="522" y="280" width="112" height="56" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="578" y="300" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">OCR + AI</text>
  <text x="578" y="315" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">classify form</text>
  <text x="578" y="328" text-anchor="middle" font-size="9" fill="#6b7280">iCONECT engine</text>

  <!-- Backstage / QA-adjacent: Doc Rule -->
  <rect x="662" y="280" width="128" height="56" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="726" y="300" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">Doc Rule routes</text>
  <text x="726" y="315" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">packet</text>
  <text x="726" y="328" text-anchor="middle" font-size="9" fill="#6b7280">WHEN / IF / THEN</text>

  <!-- Backstage / Archive -->
  <rect x="810" y="280" width="118" height="56" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
  <text x="869" y="300" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">Folder write</text>
  <text x="869" y="315" text-anchor="middle" font-size="12" fill="#111827" font-weight="500">+ audit log</text>

  <!-- Vendor / Scan -->
  <rect x="272" y="380" width="80" height="50" rx="6" fill="#ffffff" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="312" y="401" text-anchor="middle" font-size="11" fill="#374151">HLP infra</text>
  <text x="312" y="416" text-anchor="middle" font-size="9" fill="#6b7280">hosting</text>

  <!-- Vendor / Analysis -->
  <rect x="660" y="380" width="132" height="50" rx="6" fill="#ffffff" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="726" y="401" text-anchor="middle" font-size="11" fill="#374151">GDIT oversight</text>
  <text x="726" y="416" text-anchor="middle" font-size="9" fill="#6b7280">prime contractor</text>

  <!-- Horizontal flow arrows -->
  <g stroke="#111827" stroke-width="1.2" fill="none">
    <!-- Postmark → Scan (veteran down into frontstage) -->
    <path d="M 185 140 C 185 160 220 180 262 200" marker-end="url(#sb-arr)"/>
    <!-- Scan → Intake -->
    <line x1="362" y1="206" x2="386" y2="206" marker-end="url(#sb-arr)"/>
    <!-- Intake → OCR (down into backstage) -->
    <path d="M 442 234 C 442 254 480 272 522 300" marker-end="url(#sb-arr)"/>
    <!-- OCR → Doc Rule -->
    <line x1="634" y1="308" x2="662" y2="308" marker-end="url(#sb-arr)"/>
    <!-- Doc Rule → Analyst (up into frontstage) -->
    <path d="M 726 280 L 726 234" marker-end="url(#sb-arr)"/>
    <!-- Analyst → Archive (down-right) -->
    <path d="M 790 206 C 840 206 860 240 869 280" marker-end="url(#sb-arr)"/>
  </g>

  <!-- Vendor support connectors (dashed up to the systems they support) -->
  <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3" fill="none">
    <line x1="312" y1="380" x2="312" y2="234"/>
    <line x1="726" y1="380" x2="726" y2="336"/>
  </g>

  <!-- Inline arrow annotation: confidence branch -->
  <g font-size="9" fill="#6b7280" font-style="italic">
    <text x="752" y="258" text-anchor="start">auto-approve</text>
    <text x="752" y="270" text-anchor="start">if ≥ 0.8</text>
  </g>
</svg>
