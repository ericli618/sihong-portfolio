<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="cs-dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#d8d8d2"/>
    </pattern>
    <style>
      .hand { font-family: 'Kalam', 'Bradley Hand', 'Chalkboard SE', cursive; }
    </style>
  </defs>

  <rect width="960" height="440" fill="#fafaf5"/>
  <rect width="960" height="440" fill="url(#cs-dots)"/>

  <!-- Title -->
  <text x="24" y="28" font-size="15" font-weight="700" fill="#111">Card Sort — 50 Real Message Records</text>
  <text x="24" y="46" font-size="10" fill="#777">With 4 reviewers + 2 engineers • Miro • natural clustering after 20 min</text>

  <!-- Three cluster regions (overlapping circles) -->
  <g opacity="0.22">
    <circle cx="240" cy="260" r="170" fill="#ffe29a"/>
    <circle cx="480" cy="260" r="170" fill="#ffb5bb"/>
    <circle cx="720" cy="260" r="170" fill="#b8d9f0"/>
  </g>

  <!-- Cluster labels -->
  <g font-size="13" font-weight="700" fill="#111" text-anchor="middle">
    <text x="240" y="110">CONTEXT</text>
    <text x="480" y="110">EVIDENCE</text>
    <text x="720" y="110">FORENSICS</text>
  </g>
  <g font-size="9" fill="#666" text-anchor="middle" font-style="italic">
    <text x="240" y="125">"what was being said"</text>
    <text x="480" y="125">"what proves something"</text>
    <text x="720" y="125">"how we trust it"</text>
  </g>

  <!-- CONTEXT sticky notes (yellow) -->
  <g>
    <g transform="rotate(-2 190 175)">
      <rect x="155" y="155" width="70" height="40" fill="#fff3a0" stroke="#d4b81e" stroke-width="1"/>
      <text x="190" y="172" class="hand" font-size="10" fill="#222" text-anchor="middle">Slack</text>
      <text x="190" y="185" class="hand" font-size="10" fill="#222" text-anchor="middle">channel msg</text>
    </g>
    <g transform="rotate(1.5 295 180)">
      <rect x="260" y="160" width="70" height="40" fill="#fff3a0" stroke="#d4b81e" stroke-width="1"/>
      <text x="295" y="177" class="hand" font-size="10" fill="#222" text-anchor="middle">Teams DM</text>
    </g>
    <g transform="rotate(-1 180 240)">
      <rect x="145" y="220" width="70" height="40" fill="#fff3a0" stroke="#d4b81e" stroke-width="1"/>
      <text x="180" y="237" class="hand" font-size="10" fill="#222" text-anchor="middle">iMessage</text>
      <text x="180" y="250" class="hand" font-size="10" fill="#222" text-anchor="middle">thread</text>
    </g>
    <g transform="rotate(2.2 295 245)">
      <rect x="260" y="225" width="70" height="40" fill="#fff3a0" stroke="#d4b81e" stroke-width="1"/>
      <text x="295" y="242" class="hand" font-size="10" fill="#222" text-anchor="middle">Email chain</text>
    </g>
    <g transform="rotate(-1.3 205 310)">
      <rect x="170" y="290" width="70" height="40" fill="#fff3a0" stroke="#d4b81e" stroke-width="1"/>
      <text x="205" y="307" class="hand" font-size="10" fill="#222" text-anchor="middle">WhatsApp</text>
      <text x="205" y="320" class="hand" font-size="10" fill="#222" text-anchor="middle">group</text>
    </g>
    <g transform="rotate(0.8 290 320)">
      <rect x="255" y="300" width="70" height="40" fill="#fff3a0" stroke="#d4b81e" stroke-width="1"/>
      <text x="290" y="317" class="hand" font-size="10" fill="#222" text-anchor="middle">voice memo</text>
      <text x="290" y="330" class="hand" font-size="10" fill="#222" text-anchor="middle">transcript</text>
    </g>
  </g>

  <!-- EVIDENCE sticky notes (pink) -->
  <g>
    <g transform="rotate(1.8 430 180)">
      <rect x="395" y="160" width="70" height="40" fill="#ffd6d9" stroke="#d88a8e" stroke-width="1"/>
      <text x="430" y="177" class="hand" font-size="10" fill="#222" text-anchor="middle">Bloomberg</text>
      <text x="430" y="190" class="hand" font-size="10" fill="#222" text-anchor="middle">trade msg</text>
    </g>
    <g transform="rotate(-1 530 175)">
      <rect x="495" y="155" width="70" height="40" fill="#ffd6d9" stroke="#d88a8e" stroke-width="1"/>
      <text x="530" y="172" class="hand" font-size="10" fill="#222" text-anchor="middle">SMS: "deal</text>
      <text x="530" y="185" class="hand" font-size="10" fill="#222" text-anchor="middle">closed"</text>
    </g>
    <g transform="rotate(2 420 250)">
      <rect x="385" y="230" width="70" height="40" fill="#ffd6d9" stroke="#d88a8e" stroke-width="1"/>
      <text x="420" y="247" class="hand" font-size="10" fill="#222" text-anchor="middle">calendar</text>
      <text x="420" y="260" class="hand" font-size="10" fill="#222" text-anchor="middle">invite</text>
    </g>
    <g transform="rotate(-1.5 540 250)">
      <rect x="505" y="230" width="70" height="40" fill="#ffd6d9" stroke="#d88a8e" stroke-width="1"/>
      <text x="540" y="247" class="hand" font-size="10" fill="#222" text-anchor="middle">voicemail</text>
      <text x="540" y="260" class="hand" font-size="10" fill="#222" text-anchor="middle">transcript</text>
    </g>
    <g transform="rotate(1 480 320)">
      <rect x="445" y="300" width="70" height="40" fill="#ffd6d9" stroke="#d88a8e" stroke-width="1"/>
      <text x="480" y="317" class="hand" font-size="10" fill="#222" text-anchor="middle">PDF exhibit</text>
    </g>
  </g>

  <!-- FORENSICS sticky notes (blue) -->
  <g>
    <g transform="rotate(-1.5 670 180)">
      <rect x="635" y="160" width="70" height="40" fill="#c8dff5" stroke="#6f9bc4" stroke-width="1"/>
      <text x="670" y="177" class="hand" font-size="10" fill="#222" text-anchor="middle">IP address</text>
      <text x="670" y="190" class="hand" font-size="10" fill="#222" text-anchor="middle">on login</text>
    </g>
    <g transform="rotate(2 770 180)">
      <rect x="735" y="160" width="70" height="40" fill="#c8dff5" stroke="#6f9bc4" stroke-width="1"/>
      <text x="770" y="177" class="hand" font-size="10" fill="#222" text-anchor="middle">device ID</text>
    </g>
    <g transform="rotate(-0.8 675 245)">
      <rect x="640" y="225" width="70" height="40" fill="#c8dff5" stroke="#6f9bc4" stroke-width="1"/>
      <text x="675" y="242" class="hand" font-size="10" fill="#222" text-anchor="middle">timezone</text>
      <text x="675" y="255" class="hand" font-size="10" fill="#222" text-anchor="middle">offset</text>
    </g>
    <g transform="rotate(1.6 775 250)">
      <rect x="740" y="230" width="70" height="40" fill="#c8dff5" stroke="#6f9bc4" stroke-width="1"/>
      <text x="775" y="247" class="hand" font-size="10" fill="#222" text-anchor="middle">export</text>
      <text x="775" y="260" class="hand" font-size="10" fill="#222" text-anchor="middle">hash</text>
    </g>
    <g transform="rotate(-1.2 720 320)">
      <rect x="685" y="300" width="70" height="40" fill="#c8dff5" stroke="#6f9bc4" stroke-width="1"/>
      <text x="720" y="317" class="hand" font-size="10" fill="#222" text-anchor="middle">privilege</text>
      <text x="720" y="330" class="hand" font-size="10" fill="#222" text-anchor="middle">flag</text>
    </g>
  </g>

  <!-- Insight callouts in margin -->
  <g class="hand" font-size="11" fill="#c00" font-weight="700">
    <text x="480" y="398" text-anchor="middle">the UI was the three clusters, not three separate screens</text>
  </g>
  <text x="480" y="412" font-size="9" fill="#777" text-anchor="middle" font-style="italic">context first • evidence on the timeline • forensics on hover</text>
</svg>
