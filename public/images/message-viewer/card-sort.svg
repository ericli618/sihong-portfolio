<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="cs-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Panel background -->
  <rect width="960" height="440" fill="#f3f4f6" rx="8"/>

  <!-- Left side: raw records stack -->
  <g font-size="10" fill="#6b7280" letter-spacing="1.5" font-weight="500">
    <text x="40" y="50">50 RAW RECORDS</text>
  </g>

  <!-- Stack of small chips (left) -->
  <g font-size="11" fill="#374151">
    <g>
      <rect x="40" y="70" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="87">Slack thread</text>
    </g>
    <g>
      <rect x="40" y="102" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="119">iMessage</text>
    </g>
    <g>
      <rect x="40" y="134" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="151">Teams DM</text>
    </g>
    <g>
      <rect x="40" y="166" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="183">Bloomberg trade</text>
    </g>
    <g>
      <rect x="40" y="198" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="215">SMS w/ timestamp</text>
    </g>
    <g>
      <rect x="40" y="230" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="247">Email chain</text>
    </g>
    <g>
      <rect x="40" y="262" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="279">Voicemail transcript</text>
    </g>
    <g>
      <rect x="40" y="294" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="311">IP / device / hash</text>
    </g>
    <g>
      <rect x="40" y="326" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="343">Calendar invite</text>
    </g>
    <g>
      <rect x="40" y="358" width="145" height="26" rx="4" fill="#ffffff" stroke="#111827" stroke-width="1"/>
      <text x="52" y="375">+ 41 more</text>
    </g>
  </g>

  <!-- Arrow + cluster label -->
  <g>
    <line x1="215" y1="220" x2="280" y2="220" stroke="#111827" stroke-width="1.4" marker-end="url(#cs-arr)"/>
    <text x="247" y="208" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">4 reviewers +</text>
    <text x="247" y="220" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">2 engineers</text>
    <text x="247" y="240" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">clustered</text>
  </g>

  <!-- Three cluster panels on right -->
  <!-- Context cluster -->
  <g>
    <rect x="305" y="60" width="305" height="170" rx="8" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
    <text x="320" y="88" font-size="11" letter-spacing="1.5" fill="#6b7280" font-weight="600">CONTEXT</text>
    <text x="320" y="104" font-size="10" fill="#9ca3af">the conversation flow</text>
    <g font-size="11" fill="#374151">
      <rect x="320" y="118" width="90" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="330" y="133">Slack thread</text>
      <rect x="418" y="118" width="78" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="428" y="133">iMessage</text>
      <rect x="504" y="118" width="78" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="514" y="133">Teams DM</text>
      <rect x="320" y="148" width="98" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="330" y="163">Email chain</text>
      <rect x="426" y="148" width="92" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="436" y="163">WhatsApp</text>
      <rect x="526" y="148" width="70" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="536" y="163">Voicemail</text>
    </g>
    <text x="320" y="198" font-size="10" fill="#6b7280" font-style="italic">→ shown first: the message body and who said it</text>
  </g>

  <!-- Evidence cluster -->
  <g>
    <rect x="625" y="60" width="305" height="170" rx="8" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
    <text x="640" y="88" font-size="11" letter-spacing="1.5" fill="#6b7280" font-weight="600">EVIDENCE</text>
    <text x="640" y="104" font-size="10" fill="#9ca3af">the markers that anchor time</text>
    <g font-size="11" fill="#374151">
      <rect x="640" y="118" width="115" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="650" y="133">Bloomberg trade</text>
      <rect x="763" y="118" width="148" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="773" y="133">SMS w/ exact timestamp</text>
      <rect x="640" y="148" width="110" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="650" y="163">Calendar invite</text>
      <rect x="758" y="148" width="98" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="768" y="163">PDF exhibit</text>
    </g>
    <text x="640" y="198" font-size="10" fill="#6b7280" font-style="italic">→ shown inline: timestamp chips + evidence badges</text>
  </g>

  <!-- Forensics cluster (bottom, wider) -->
  <g>
    <rect x="305" y="250" width="625" height="140" rx="8" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>
    <text x="320" y="278" font-size="11" letter-spacing="1.5" fill="#6b7280" font-weight="600">FORENSICS</text>
    <text x="320" y="294" font-size="10" fill="#9ca3af">metadata the lawyers need but don&apos;t want to see first</text>
    <g font-size="11" fill="#374151">
      <rect x="320" y="308" width="94" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="330" y="323">IP address</text>
      <rect x="422" y="308" width="92" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="432" y="323">Device ID</text>
      <rect x="522" y="308" width="100" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="532" y="323">Export hash</text>
      <rect x="630" y="308" width="86" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="640" y="323">Timezone</text>
      <rect x="724" y="308" width="108" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="734" y="323">Privilege flag</text>
      <rect x="840" y="308" width="78" height="22" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
      <text x="850" y="323">BCC list</text>
    </g>
    <text x="320" y="360" font-size="10" fill="#6b7280" font-style="italic">→ hidden behind a disclosure toggle, one click away</text>
  </g>
</svg>
