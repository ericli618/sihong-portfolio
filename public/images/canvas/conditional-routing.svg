<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" width="820" height="360">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#111"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#999"/>
    </marker>
  </defs>
  <rect width="820" height="360" fill="#f5f5f5" rx="6"/>

  <!-- Extractor -->
  <rect x="30" y="140" width="120" height="50" rx="8" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="90" y="170" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#111" text-anchor="middle">Extractor</text>

  <!-- Arrow from Extractor to decision diamond -->
  <line x1="150" y1="165" x2="195" y2="165" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision diamond with label -->
  <polygon points="235,135 285,165 235,195 185,165" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="235" y="162" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#111" text-anchor="middle">confidence</text>
  <text x="235" y="176" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#111" text-anchor="middle">check</text>

  <!-- HIGH confidence path (up to QC Agent) -->
  <path d="M 255 148 L 300 90 L 360 90" stroke="#111" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="310" y="75" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#111" text-anchor="middle">≥ 0.80</text>

  <!-- LOW confidence path (down to Human Review) -->
  <path d="M 255 182 L 300 240 L 360 240" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arr-g)"/>
  <text x="310" y="260" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#666" text-anchor="middle">&lt; 0.80</text>

  <!-- QC Agent -->
  <rect x="360" y="65" width="110" height="50" rx="8" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="415" y="95" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#111" text-anchor="middle">QC Agent</text>
  <line x1="470" y1="90" x2="510" y2="90" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dedupe -->
  <rect x="510" y="65" width="110" height="50" rx="8" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="565" y="95" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#111" text-anchor="middle">Dedupe</text>
  <line x1="620" y1="90" x2="660" y2="90" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="660" y="65" width="100" height="50" rx="8" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="710" y="95" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#111" text-anchor="middle">Output</text>

  <!-- Human Review -->
  <rect x="360" y="215" width="110" height="50" rx="8" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="415" y="245" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#111" text-anchor="middle">Human Review</text>

  <!-- Action labels to the RIGHT of the pill -->
  <text x="485" y="245" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#666" text-anchor="start">Approve · Reject · Escalate</text>

  <!-- Approve path: up from pill top, over, down into Dedupe bottom -->
  <path d="M 425 215 L 425 140 L 565 140 L 565 117" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arr-g)"/>
  <text x="495" y="135" font-family="system-ui,sans-serif" font-size="10" fill="#666" text-anchor="middle">approve</text>

  <!-- Reject/Escalate loop back to Extractor -->
  <path d="M 415 265 L 415 320 L 90 320 L 90 192" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arr-g)"/>
  <text x="250" y="315" font-family="system-ui,sans-serif" font-size="10" fill="#666" text-anchor="middle">reject / escalate → re-extract</text>
</svg>
