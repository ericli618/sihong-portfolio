<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="dd-dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#d8d8d2"/>
    </pattern>
    <style>
      .hand { font-family: 'Kalam', 'Bradley Hand', 'Chalkboard SE', cursive; }
    </style>
  </defs>

  <rect width="960" height="440" fill="#fafaf5"/>
  <rect width="960" height="440" fill="url(#dd-dots)"/>

  <!-- Title -->
  <text x="24" y="28" font-size="15" font-weight="700" fill="#111">Discarded Direction — List-Based Pipeline Config v0.1</text>
  <text x="24" y="46" font-size="10" fill="#777">Figma • killed after 3 days • didn't survive the "what connects to what?" question</text>

  <!-- Mock UI frame -->
  <g>
    <rect x="60" y="80" width="680" height="300" fill="#ffffff" stroke="#222" stroke-width="1.5" rx="6"/>
    <rect x="60" y="80" width="680" height="32" fill="#f2f2ee" stroke="#222" stroke-width="1.5" rx="6"/>
    <rect x="60" y="102" width="680" height="10" fill="#f2f2ee"/>

    <!-- fake window chrome -->
    <circle cx="76" cy="96" r="4" fill="#ff6159"/>
    <circle cx="88" cy="96" r="4" fill="#ffbd2e"/>
    <circle cx="100" cy="96" r="4" fill="#28c940"/>
    <text x="400" y="100" font-size="10" fill="#888" text-anchor="middle">Pipeline Configuration</text>

    <!-- Table header -->
    <rect x="76" y="128" width="648" height="28" fill="#f6f6f2" stroke="#d5d5cf"/>
    <g font-size="10" font-weight="700" fill="#333">
      <text x="92" y="146">#</text>
      <text x="132" y="146">STEP NAME</text>
      <text x="260" y="146">TYPE</text>
      <text x="370" y="146">INPUT FROM</text>
      <text x="490" y="146">OUTPUT TO</text>
      <text x="600" y="146">CONDITION</text>
    </g>

    <!-- Rows -->
    <g font-size="10" fill="#222">
      <rect x="76" y="156" width="648" height="28" fill="#ffffff" stroke="#e8e8e2"/>
      <text x="92" y="174">1</text>
      <text x="132" y="174">load_records</text>
      <text x="260" y="174">Input</text>
      <text x="370" y="174">—</text>
      <text x="490" y="174">step_2</text>
      <text x="600" y="174">always</text>

      <rect x="76" y="184" width="648" height="28" fill="#fafaf5" stroke="#e8e8e2"/>
      <text x="92" y="202">2</text>
      <text x="132" y="202">extract_pii</text>
      <text x="260" y="202">Extractor</text>
      <text x="370" y="202">step_1</text>
      <text x="490" y="202">step_3, step_5</text>
      <text x="600" y="202">conf ≥ 0.8 → 3</text>

      <rect x="76" y="212" width="648" height="28" fill="#ffffff" stroke="#e8e8e2"/>
      <text x="92" y="230">3</text>
      <text x="132" y="230">qc_validate</text>
      <text x="260" y="230">QC Agent</text>
      <text x="370" y="230">step_2</text>
      <text x="490" y="230">step_4</text>
      <text x="600" y="230">always</text>

      <rect x="76" y="240" width="648" height="28" fill="#fafaf5" stroke="#e8e8e2"/>
      <text x="92" y="258">4</text>
      <text x="132" y="258">dedupe</text>
      <text x="260" y="258">Dedupe</text>
      <text x="370" y="258">step_3</text>
      <text x="490" y="258">step_6</text>
      <text x="600" y="258">always</text>

      <rect x="76" y="268" width="648" height="28" fill="#ffffff" stroke="#e8e8e2"/>
      <text x="92" y="286">5</text>
      <text x="132" y="286">human_review</text>
      <text x="260" y="286">Human</text>
      <text x="370" y="286">step_2</text>
      <text x="490" y="286">step_4 (approve)</text>
      <text x="600" y="286">conf &lt; 0.8</text>

      <rect x="76" y="296" width="648" height="28" fill="#fafaf5" stroke="#e8e8e2"/>
      <text x="92" y="314">6</text>
      <text x="132" y="314">export</text>
      <text x="260" y="314">Output</text>
      <text x="370" y="314">step_4</text>
      <text x="490" y="314">—</text>
      <text x="600" y="314">always</text>
    </g>

    <!-- + Add step button -->
    <rect x="76" y="336" width="90" height="24" fill="#ffffff" stroke="#999" stroke-dasharray="3,2" rx="3"/>
    <text x="121" y="352" font-size="10" fill="#666" text-anchor="middle">+ add step</text>
  </g>

  <!-- KILLED stamp (tilted red) -->
  <g transform="rotate(-14 470 230)" opacity="0.75">
    <rect x="300" y="195" width="340" height="70" fill="none" stroke="#c00" stroke-width="4" rx="4"/>
    <text x="470" y="240" font-size="44" font-weight="900" fill="#c00" text-anchor="middle" letter-spacing="4">KILLED</text>
  </g>

  <!-- Annotation notes on right -->
  <g class="hand" font-size="11" fill="#222">
    <text x="770" y="120">why it failed:</text>
  </g>
  <g font-size="10" fill="#333">
    <text x="770" y="145">• "step_3, step_5" in one cell</text>
    <text x="770" y="160">  hides the fork</text>
    <text x="770" y="182">• no way to see disconnected</text>
    <text x="770" y="197">  or circular wiring</text>
    <text x="770" y="219">• reviewers kept asking</text>
    <text x="770" y="234">  "what flows where?"</text>
    <text x="770" y="256">• table-native users couldn't</text>
    <text x="770" y="271">  hold the shape in their head</text>
  </g>

  <g class="hand" font-size="11" fill="#c00" font-weight="700">
    <text x="770" y="310">→ the shape IS the logic</text>
    <text x="770" y="326">  so show the shape</text>
  </g>

  <text x="770" y="365" font-size="10" fill="#777" font-style="italic">replaced by node canvas v0.2</text>

  <!-- Caption below -->
  <text x="480" y="410" font-size="10" fill="#555" text-anchor="middle" font-style="italic">
    Early list-based config — killed on day 3. Readers could see the steps but not how they wired together.
  </text>
</svg>
