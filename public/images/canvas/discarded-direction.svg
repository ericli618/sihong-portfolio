<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440" font-family="Inter, -apple-system, system-ui, sans-serif">
  <!-- Panel background -->
  <rect width="960" height="440" fill="#f3f4f6" rx="8"/>

  <!-- Small top label -->
  <text x="40" y="44" font-size="10" letter-spacing="1.5" fill="#6b7280" font-weight="600">LIST-BASED PIPELINE CONFIG — KILLED ON DAY 3</text>

  <!-- Mock table container -->
  <rect x="40" y="62" width="680" height="320" rx="6" fill="#ffffff" stroke="#111827" stroke-width="1.2"/>

  <!-- Table header row -->
  <rect x="40" y="62" width="680" height="36" rx="6" fill="#f9fafb" stroke="#111827" stroke-width="1.2"/>
  <rect x="40" y="86" width="680" height="12" fill="#f9fafb"/>
  <g font-size="10" letter-spacing="1.2" fill="#6b7280" font-weight="600">
    <text x="56" y="84">#</text>
    <text x="92" y="84">STEP</text>
    <text x="220" y="84">INPUT FROM</text>
    <text x="370" y="84">OUTPUT TO</text>
    <text x="520" y="84">RULE</text>
  </g>

  <!-- Column dividers -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="80" y1="62" x2="80" y2="382"/>
    <line x1="208" y1="62" x2="208" y2="382"/>
    <line x1="358" y1="62" x2="358" y2="382"/>
    <line x1="508" y1="62" x2="508" y2="382"/>
  </g>

  <!-- Table rows -->
  <g font-size="12" fill="#374151">
    <!-- Row 1 -->
    <line x1="40" y1="144" x2="720" y2="144" stroke="#e5e7eb" stroke-width="1"/>
    <text x="56" y="124">1</text>
    <text x="92" y="124" font-weight="500">OCR</text>
    <text x="220" y="124">Source PDF</text>
    <text x="370" y="124">Extractor</text>
    <text x="520" y="124" fill="#9ca3af">—</text>

    <!-- Row 2 -->
    <line x1="40" y1="190" x2="720" y2="190" stroke="#e5e7eb" stroke-width="1"/>
    <text x="56" y="170">2</text>
    <text x="92" y="170" font-weight="500">Extractor</text>
    <text x="220" y="170">Step 1</text>
    <text x="370" y="170">Step 3, Step 5</text>
    <text x="520" y="170" font-size="11">confidence ≥ 0.8 ? 3 : 5</text>

    <!-- Row 3 -->
    <line x1="40" y1="236" x2="720" y2="236" stroke="#e5e7eb" stroke-width="1"/>
    <text x="56" y="216">3</text>
    <text x="92" y="216" font-weight="500">QC Agent</text>
    <text x="220" y="216">Step 2</text>
    <text x="370" y="216">Step 4</text>
    <text x="520" y="216" fill="#9ca3af">—</text>

    <!-- Row 4 -->
    <line x1="40" y1="282" x2="720" y2="282" stroke="#e5e7eb" stroke-width="1"/>
    <text x="56" y="262">4</text>
    <text x="92" y="262" font-weight="500">Dedupe</text>
    <text x="220" y="262">Step 3, Step 5</text>
    <text x="370" y="262">Output</text>
    <text x="520" y="262" fill="#9ca3af">—</text>

    <!-- Row 5 -->
    <line x1="40" y1="328" x2="720" y2="328" stroke="#e5e7eb" stroke-width="1"/>
    <text x="56" y="308">5</text>
    <text x="92" y="308" font-weight="500">Human Review</text>
    <text x="220" y="308">Step 2</text>
    <text x="370" y="308">Step 4</text>
    <text x="520" y="308" font-size="11">on reviewer approve</text>

    <!-- Row 6 (the orphan) -->
    <text x="56" y="354">6</text>
    <text x="92" y="354" font-weight="500">Notify</text>
    <text x="220" y="354" fill="#9ca3af">—</text>
    <text x="370" y="354" fill="#9ca3af">—</text>
    <text x="520" y="354" font-size="11" fill="#9ca3af">(orphan step)</text>
  </g>

  <!-- Annotation leader lines (gray, subtle) -->
  <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3" fill="none">
    <!-- Row 2 Output cell → right panel annotation -->
    <path d="M 440 170 Q 520 140 760 120"/>
    <!-- Row 2 Rule cell → right panel -->
    <path d="M 620 170 Q 680 195 760 220"/>
    <!-- Row 6 orphan → annotation -->
    <path d="M 480 354 Q 580 360 760 330"/>
  </g>

  <!-- Annotations on right -->
  <g font-size="11" fill="#374151">
    <text x="760" y="108" font-weight="600" fill="#111827">Forks hide in a cell.</text>
    <text x="760" y="124">Reviewers had to parse</text>
    <text x="760" y="138">commas to see branches.</text>

    <text x="760" y="212" font-weight="600" fill="#111827">Rule syntax drifts.</text>
    <text x="760" y="228">Every author wrote the</text>
    <text x="760" y="242">conditional a little</text>
    <text x="760" y="256">differently.</text>

    <text x="760" y="318" font-weight="600" fill="#111827">Orphans look valid.</text>
    <text x="760" y="334">A disconnected step</text>
    <text x="760" y="348">passed review because</text>
    <text x="760" y="362">its row was complete.</text>
  </g>

  <!-- Bottom summary caption -->
  <text x="40" y="410" font-size="11" fill="#6b7280" font-style="italic">Every cell was legible. The graph shape wasn&apos;t. Moved to the canvas on day 3.</text>
</svg>
